name: Python Security Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security-scans:
    name: Security Scanning
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies and security tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit safety pip-audit
      
      - name: SAST - Run Bandit
        continue-on-error: true 
        # Added '-f txt' for clean, human-readable terminal output
        run: |
          bandit -r . -ll -ii -f txt
      
      - name: SCA - Run pip-audit
        continue-on-error: true
        run: |
          pip-audit -r requirements.txt
      
      - name: SCA - Run Safety (Updated)
        continue-on-error: true
        # Swapped 'check' for 'scan' to resolve the deprecation warning
        run: |
          safety scan -r requirements.txt
