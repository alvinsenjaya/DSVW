name: Python Security Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security-scans:
    name: Security Scanning
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies and security tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit safety pip-audit
      
      # Analyzes your actual Python code for vulnerabilities
      - name: SAST - Run Bandit
        continue-on-error: true 
        run: |
          bandit -r . -ll -ii
      
      # Checks your requirements.txt against the PyPA vulnerability database
      - name: SCA - Run pip-audit
        continue-on-error: true
        run: |
          pip-audit -r requirements.txt
      
      # Checks your installed dependencies against the Safety vulnerability database
      - name: SCA - Run Safety
        continue-on-error: true
        run: |
          safety check -r requirements.txt
