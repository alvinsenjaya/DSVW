name: Python Security Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security-scans:
    name: Security Scanning
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies and security tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit pip-audit
      
      # 1. Scan custom code
      - name: SAST - Run Bandit
        continue-on-error: true 
        run: |
          bandit -r . -ll -ii -f txt
      
      # 2. Scan dependencies (PyPA tool)
      - name: SCA - Run pip-audit
        continue-on-error: true
        run: |
          pip-audit -r requirements.txt

      # 3. Setup OSV-Scanner (Google's Safety Alternative)
      - name: Install OSV-Scanner
        run: |
          curl -sL https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64 -o osv-scanner
          chmod +x osv-scanner
          sudo mv osv-scanner /usr/local/bin/
          
      # 4. Scan dependencies (OSV-Scanner)
      - name: SCA - Run OSV-Scanner
        continue-on-error: true
        run: |
          # The -r flag recursively scans your repository for requirements.txt files
          osv-scanner -r .
